repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']  # Allow custom tags in docker-compose
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-json
        name: Check JSON syntax
      - id: mixed-line-ending
        name: Fix mixed line endings

  # Python linting and formatting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.10.4
    hooks:
      - id: ruff
        name: Ruff lint
        args: [--fix]
        files: ^apps/backend/
      - id: ruff-format
        name: Ruff format
        files: ^apps/backend/

  # Prevent .env file commits
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
        name: Detect private keys
      - id: check-case-conflict
        name: Check for case conflicts

  # Custom hook to reject .env files
  - repo: local
    hooks:
      - id: reject-env-files
        name: Reject .env files
        entry: '.env files should never be committed'
        language: fail
        files: '\.env$'

  # Secret scanning with gitleaks — catches tokens, API keys, service-role keys, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks
        name: Detect secrets with gitleaks

  # Prevent commits to protected branches
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: Don't commit to main
        args: ['--branch', 'main']

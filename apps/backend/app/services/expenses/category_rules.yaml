  # ── 11. HOUSING ────────────────────────────────────────────────────────────
  - slug: housing
    name: Housing
    name_he: דיור
    icon: home
    color: "#795548"
    display_order: 12
    rules:
      # Meniv Rishon (מניב ראשון) — water utility in Rishon LeZion
      # Hebrew מניב → reversed בינמ
      - pattern: "meniv\\s*rishon|בינמ.*ןושאר|מניב\\s*ראשון"
        weight: 0.95
      # Hagihon (הגיחון) — Jerusalem water utility
      - pattern: "hagihon|ןוחיגה"
        weight: 0.95
      # Mei Avivim (מי אביבים) — Tel Aviv water utility
      - pattern: "mei\\s*avivim|םיביבא\\s*ימ"
        weight: 0.95
      # Israel Electric Corporation (IEC / חברת החשמל)
      # Extracted: למשחה תרבח (reversed חברת החשמל)
      - pattern: "\\biec\\b|למשחה\\s*תרבח|israel\\s*electric|חברת\\s*החשמל"
        weight: 0.95
      # Pazgas, Supergas, Amisragas — cooking gas providers
      - pattern: "pazgas|supergas|amisragas|סגזפ|סגרפוס"

      - pattern: "טקטנוק|contact.*sport|contact.*rehab"
        weight: 0.85
      # Kupat Holim health funds (מכבי → reversed יבכמ, כללית → reversed תיללכ)
      - pattern: "יבכמ|תיללכ|תדחואמ|יתומאל"
        weight: 0.8
      # Generic pharmacy/clinic fallback
      - pattern: "(pharmacy|clinic|medical|הפרמ|אפור)"
        weight: 0.3
    subcategories:
      - slug: health-pharmacy
        name: Pharmacy
        name_he: בית מרקחת
        display_order: 1
        rules:
          # Super-Pharm (סופר-פארם → reversed מראפ-רפוס)
          - pattern: "מראפ.רפוס|super.?pharm"
            weight: 0.95
          - pattern: "pharmacy|new.?pharm|תפרמ\\b"
            weight: 0.8

      - slug: health-medical
        name: Medical & Clinics
        name_he: רפואה ומרפאות
        display_order: 2
        rules:
          # Kupat Holim funds — reversed forms
          - pattern: "יבכמ|תיללכ|תדחואמ|יתומאל"
            weight: 0.9
          - pattern: "clinic|maccabi|clalit|leumit|meuhedet"
            weight: 0.8

      - slug: health-fitness
        name: Fitness & Sports
        name_he: כושר וספורט
        display_order: 3
        rules:
          # Contact rehab & sports centre (קונטקט → reversed טקטנוק)
          - pattern: "טקטנוק"
            weight: 0.9
          # Naimi Park fitness (from Isracard, sector sport/leisure)
          # Extracted: ענמת קראפ דיינ (reversed text)
          - pattern: "קראפ\\s*דיינ|naimi.*park"
            weight: 0.85
          - pattern: "holmes.place|gym|fitness|crossfit|yoga|sport.center"
            weight: 0.7

  # ── 4. UTILITIES ───────────────────────────────────────────────────────────
  - slug: utilities
    name: Utilities & Communications
    name_he: שירותים ותקשורת
    icon: bolt
    color: "#607D8B"
    display_order: 4
    rules:
      # Bezeq (בזק) — Israel's main telecom. Extracted: קזב (reversed)
      # Bezeq Energy branding also seen: ENERGY קזב
      - pattern: "קזב|bezeq"
        weight: 0.9
      # HOT — cable TV + internet provider (standing order ₪84.90/month on Jony's Isracard)
      - pattern: "\\bhot\\b"
        weight: 0.85
      # HOT MOBILE — mobile phone (seen on Jony's Cal card, multiple times)
      - pattern: "hot\\s*mobile"
        weight: 0.9
      # Partner telecom (פרטנר → reversed רנטרפ)
      - pattern: "רנטרפ|partner|012"
        weight: 0.8
      # Generic telecom fallback
      - pattern: "(cellcom|רמוכלס|pelephone|ןופאלפ|golan|ןלוג)"
        weight: 0.7
    subcategories:
      - slug: utilities-internet-tv
        name: Internet & Cable TV
        name_he: אינטרנט וטלוויזיה
        display_order: 1
        rules:
          # HOT cable/internet (monthly standing order, Jony's Isracard card)
          - pattern: "\\bhot\\b(?!\\s*mobile)"
            weight: 0.9
          # Bezeq internet
          - pattern: "קזב|bezeq"
            weight: 0.85
          - pattern: "yes\\b|partner.*internet"
            weight: 0.7

      - slug: utilities-phone
        name: Mobile Phone
        name_he: טלפון נייד
        display_order: 2
        rules:
          # HOT MOBILE — standing order and one-time charges both seen
          - pattern: "hot\\s*mobile"
            weight: 0.95
          # Other Israeli mobile operators
          - pattern: "(cellcom|רמוכלס|pelephone|ןופאלפ|partner|רנטרפ|golan|ןלוג|019|רמי.לוי.מובייל)"
            weight: 0.8

      - slug: utilities-streaming
        name: Streaming Services
        name_he: סטרימינג ומנויים
        display_order: 3
        rules:
          # HBO Max — seen on Jony's Isracard as HELP.HBOMAX.COM (₪84.90/month)
          # Isracard spaces the name: H ELP.HBOMAX.COM
          - pattern: "h\\s*elp\\.hbomax|hbomax|hbo"
            weight: 0.95
          - pattern: "netflix|spotify|apple\\.com/bill|youtube.*premium|disney|paramount"
            weight: 0.9


      # Arnona (ארנונה) — property tax
      # Extracted: הנורא (reversed ארנונה)
      - pattern: "arnona|הנורא|ארנונה"
        weight: 0.95
      # Va'ad Bayit (ועד בית) — building HOA
      # Extracted: תיב דעו (reversed ועד בית)
      - pattern: "va'?ad\\s*ba?yit|תיב\\s*דעו|ועד\\s*בית"
        weight: 0.9
      # Home insurance context clues (ביטוח + דירה)
      # דירה → הריד (reversed)
      - pattern: "חוטיב.*הריד|insurance.*dwelling|home\\s*insurance"
        weight: 0.85
      # Generic housing utility fallback
      - pattern: "(plumb|electrician|תקלסטלא|םיקינכט|handyman)"
        weight: 0.4
    subcategories:

      - pattern: "הסנכה\\s*סמ|income\\s*tax|תוביצנ"
        weight: 0.85
      # Municipality — Rishon LeZion city seen on Jony's card (₪207 answer service)
      # Extracted: תייריע (reversed עיריית = municipality)
      - pattern: "תייריע|municipality"

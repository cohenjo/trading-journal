# Credit-Card Expense Category Taxonomy
# Owned by McManus (Data/Finance Dev). This file is the single source of truth
# for category metadata and deterministic classification rules.
#
# The seed migration (20260529122501_seed_expense_categories.sql) loads top-level
# + subcategories into the `expense_categories` table. Rules in this file are
# loaded by the categorization engine (CC-4) — they are NOT stored in the DB.
#
# ─────────────────────────────────────────────────────────────────────────────
# CONVENTIONS
# ─────────────────────────────────────────────────────────────────────────────
# slug         stable kebab-case English key used in code, UI, and API.
# name         English display label.
# name_he      Hebrew display label.
# is_transfer  true  → category is a cash movement between people (not consumption);
#              excluded from household expense totals.
# display_order integer sort key within siblings (0-indexed per level).
#
# rules        list of {pattern, weight?} entries.
#              pattern   Python `re` regex matched CASE-INSENSITIVELY against
#                        merchant_normalized (the cleaned/uppercased merchant string
#                        extracted from the PDF).
#              weight    optional float 0–1; higher = preferred when multiple
#                        categories match. Default = 0.5.
#              First match (by display_order of subcategory before parent, then
#              highest weight) wins.
#
# ─────────────────────────────────────────────────────────────────────────────
# ⚠️  RTL EXTRACTION GOTCHA (critical for Hebrew pattern authoring)
# ─────────────────────────────────────────────────────────────────────────────
# pdfplumber extracts Cal / Isracard Hebrew PDFs character-by-character in the
# visual (left-to-right on page) order. For RTL-rendered Hebrew, this means:
#   • Each Hebrew WORD has its characters REVERSED relative to the logical Unicode.
#     Example:  שופרסל (Shufersal) → extracted as לסרפוש
#               טיב טעם (Tiv Ta'am) → extracted as ביט / םעט
#               פנגו (Pango)        → extracted as וגנפ
#               בזק  (Bezeq)        → extracted as קזב
#               ביטוח (insurance)   → extracted as חוטיב
#               סופר-פארם           → extracted as מראפ-רפוס
#   • English words are NOT reversed (but Isracard inserts spaces: A LIEXPRESS).
#   • Word ORDER within a multi-word merchant is also reversed on extraction.
# Patterns below match the EXTRACTED (reversed) form, not the display form.
# ─────────────────────────────────────────────────────────────────────────────

version: 1

categories:

  # ── 1. GROCERIES ───────────────────────────────────────────────────────────
  - slug: groceries
    name: Groceries
    name_he: מזון וסופרמרקט
    icon: shopping-cart
    color: "#4CAF50"
    display_order: 1
    rules:
      # Shufersal (שופרסל) — Israel's largest supermarket chain.
      # Extracted forms: לסרפוש (reversed שופרסל) with branch suffixes like ליד, ינושאר ןוינק
      - pattern: "לסרפוש"
        weight: 0.9
      # Tiv Ta'am (טיב טעם) — premium grocery chain
      - pattern: "ביט\\s*םעט"
        weight: 0.9
      # FYM — small market / convenience store seen on Jony's card
      - pattern: "\\bFYM\\b"
        weight: 0.8
      # Etz Hasadeh (עץ השדה) — organic farm delivery seen on Jony's card
      # Extracted: הדשה ץע (reversed)
      - pattern: "הדשה\\s*ץע"
        weight: 0.8
      # Generic Hebrew supermarket / market fallback
      - pattern: "(תלוכמ|קוש\\s*לכאמ|ירקי)"
        weight: 0.3
    subcategories: []

  # ── 2. RESTAURANTS ─────────────────────────────────────────────────────────
  - slug: restaurants
    name: Restaurants & Food Delivery
    name_he: מסעדות ומשלוחים
    icon: utensils
    color: "#FF9800"
    display_order: 2
    rules:
      # Wolt — dominant food delivery app in Israel
      - pattern: "\\bwolt\\b"
        weight: 0.95
      # Schwartz Herzl / Shawarma Herzl 2 — fast-food shawarma chain.
      # Extracted: המראווש (reversed שווארמה = shawarma)
      - pattern: "המראווש"
        weight: 0.85
      # Domino's Pizza (דומינוס פיצה). Extracted: סונימוד + הציפ
      - pattern: "סונימוד|domino"
        weight: 0.85
      # Nina DEAR (restaurant in Rishon). Hebrew name הנינ = reversed נינה (Nina)
      - pattern: "DEAR|הנינ\\s*DEAR|nina.*dear"
        weight: 0.85
      # Naimi Bakery / Gourmet deli (from Isracard, sector תוינדעמ = gourmet)
      # Extracted: ןמאנ הפאמ דיינ (reversed נייד מאפה נאמן = Naimi Loyal Bakery)
      - pattern: "הפאמ\\s*ןמאנ|naimi.*bak|דיינ.*הפאמ"
        weight: 0.8
      # FCB Fan Zone — seen in Spain trip charges, food at event
      - pattern: "fcb\\s*fan|fan\\s*zone"
        weight: 0.7
      # Generic café / restaurant fallback
      - pattern: "(cafe|coffee|restaurant|bistro|rest\\b)"
        weight: 0.3
    subcategories:
      - slug: restaurants-delivery
        name: Food Delivery
        name_he: משלוחים
        display_order: 1
        rules:
          - pattern: "\\bwolt\\b"
            weight: 0.95
          - pattern: "uber\\s*eats|bolt\\s*food|10bis|יסיבוט"
            weight: 0.8

      - slug: restaurants-fast-food
        name: Fast Food
        name_he: מזון מהיר
        display_order: 2
        rules:
          # Shawarma / fast-food Hebrew (המראווש = reversed שווארמה)
          - pattern: "המראווש"
            weight: 0.9
          # Domino's
          - pattern: "סונימוד|domino"
            weight: 0.9
          - pattern: "mcdonald|burger.king|kfc|subway"
            weight: 0.85

      - slug: restaurants-dine-in
        name: Dine-In Restaurants
        name_he: מסעדות ישיבה
        display_order: 3
        rules:
          # Nina DEAR restaurant
          - pattern: "DEAR|הנינ.*DEAR|nina"
            weight: 0.85
          # Naimi Bakery / deli
          - pattern: "הפאמ\\s*ןמאנ|דיינ.*הפאמ"
            weight: 0.8
          # Generic restaurant cues
          - pattern: "restaurant|bistro|הדעסמ"
            weight: 0.4


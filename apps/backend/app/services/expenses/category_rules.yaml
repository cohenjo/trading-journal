      - pattern: "e\\s*uropapark|europapark"
        weight: 0.9
      # El Al airline (לאל → reversed לאל, or simply el.al)
      - pattern: "\\bel\\s*al\\b|לאל\\b"
        weight: 0.9
      # Pango parking app (פנגו → reversed וגנפ). Monthly standing order seen.
      - pattern: "וגנפ|pango"
        weight: 0.85
      # Zdal parking lot (חניון זדל). Extracted: לדז ןוינח
      - pattern: "לדז|ןוינח"
        weight: 0.7
      # Nike Israel parking (seen as תוריית sector, small amount ₪9.80)
      - pattern: "לארשי\\s*סקייאנ"
        weight: 0.5
    subcategories:
      - slug: travel-flights
        name: Flights
        name_he: טיסות
        display_order: 1
        rules:

          - pattern: "meniv\\s*rishon|בינמ.*ןושאר|מניב\\s*ראשון"
            weight: 0.95
          # Hagihon (Jerusalem water)
          - pattern: "hagihon|ןוחיגה"
            weight: 0.95
          # Mei Avivim (Tel Aviv)
          - pattern: "mei\\s*avivim|םיביבא\\s*ימ"
            weight: 0.95
          # Mey Galim (Haifa)
          - pattern: "mey\\s*galim|םילג\\s*ימ"
            weight: 0.95
          # Pelagei Sharon (Sharon region)
          - pattern: "pelagei\\s*sharon|ןורש\\s*יגלפ"
            weight: 0.95
          # Generic water utility cue
          - pattern: "(\\bwater\\b|םימ\\s*תרבח|water\\s*corporation)"
            weight: 0.7

      - slug: housing-electricity
        name: Electricity
        name_he: חשמל
        display_order: 2
        rules:
          # Israel Electric Corporation (IEC / חברת החשמל)

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# pdfplumber extracts Cal / Isracard Hebrew PDFs character-by-character in the
# visual (left-to-right on page) order. For RTL-rendered Hebrew, this means:
#   вҖў Each Hebrew WORD has its characters REVERSED relative to the logical Unicode.
#     Example:  Ч©Ч•ЧӨЧЁЧЎЧң (Shufersal) вҶ’ extracted as ЧңЧЎЧЁЧӨЧ•Ч©
#               ЧҳЧҷЧ‘ ЧҳЧўЧқ (Tiv Ta'am) вҶ’ extracted as Ч‘ЧҷЧҳ / ЧқЧўЧҳ
#               ЧӨЧ Ч’Ч• (Pango)        вҶ’ extracted as Ч•Ч’Ч ЧӨ
#               Ч‘Ч–Ч§  (Bezeq)        вҶ’ extracted as Ч§Ч–Ч‘
#               Ч‘ЧҷЧҳЧ•Ч— (insurance)   вҶ’ extracted as Ч—Ч•ЧҳЧҷЧ‘
#               ЧЎЧ•ЧӨЧЁ-ЧӨЧҗЧЁЧқ           вҶ’ extracted as ЧһЧЁЧҗЧӨ-ЧЁЧӨЧ•ЧЎ
#   вҖў English words are NOT reversed (but Isracard inserts spaces: A LIEXPRESS).
#   вҖў Word ORDER within a multi-word merchant is also reversed on extraction.
# Patterns below match the EXTRACTED (reversed) form, not the display form.
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ


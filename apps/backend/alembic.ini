[alembic]
script_location = alembic
# sqlalchemy.url is set at runtime from the DIRECT_DATABASE_URL or DATABASE_URL
# environment variable in alembic/env.py — do not commit real credentials here.
sqlalchemy.url = postgresql://localhost/trading_journal

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

services:
  worker:
    container_name: trading_journal_worker
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "-m", "app.worker.runtime"]
    environment:
      # Worker now connects to Supabase only. Set DATABASE_URL in .env.
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Supabase connection string}
      WORKER_HEARTBEAT_FILE: /app/worker_heartbeat
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

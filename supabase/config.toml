# supabase/config.toml
# Local dev stack configuration for trading-journal.
# TJ-001 (Kujan) — DO NOT commit local overrides here; use env vars for secrets.
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "trading-journal"

# ─────────────────────────────────────────────────────────────────────────────
# API (PostgREST)
# ─────────────────────────────────────────────────────────────────────────────
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public", "raw", "compute", "cooked"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

# ─────────────────────────────────────────────────────────────────────────────
# Database (Postgres)
# Matches the remote Supabase PG major version.
# ─────────────────────────────────────────────────────────────────────────────
[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# ─────────────────────────────────────────────────────────────────────────────
# Studio (web UI)
# ─────────────────────────────────────────────────────────────────────────────
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# ─────────────────────────────────────────────────────────────────────────────
# Inbucket (local email capture — all auth emails land here)
# ─────────────────────────────────────────────────────────────────────────────
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ─────────────────────────────────────────────────────────────────────────────
# Realtime
# ─────────────────────────────────────────────────────────────────────────────
[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

# ─────────────────────────────────────────────────────────────────────────────
# Storage
# ─────────────────────────────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false

# ─────────────────────────────────────────────────────────────────────────────
# Auth (GoTrue)
# ─────────────────────────────────────────────────────────────────────────────
[auth]
enabled = true
# Must match the frontend dev server origin so OAuth redirects work locally.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
# Disable email confirmations locally so seed/test users log in instantly.
enable_confirmations = false
secure_password_change = false
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }} ."
max_frequency = "5s"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.mfa.web_authn]
enroll_enabled = false
verify_enabled = false

[auth.sessions]
timebox = "0"
inactivity_timeout = "0"

# ─────────────────────────────────────────────────────────────────────────────
# External auth providers
# Toggle these on in Supabase Dashboard for local testing; see runbook §9.
# ─────────────────────────────────────────────────────────────────────────────
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
skip_nonce_check = false

# ─────────────────────────────────────────────────────────────────────────────
# Edge Functions (Deno — not used yet, included for completeness)
# ─────────────────────────────────────────────────────────────────────────────
[edge_runtime]
enabled = false
policy = "oneshot"
inspector_port = 8083

# ─────────────────────────────────────────────────────────────────────────────
# Analytics (disabled locally)
# ─────────────────────────────────────────────────────────────────────────────
[analytics]
enabled = false
port = 54327
backend = "postgres"

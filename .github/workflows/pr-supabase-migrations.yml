name: PR — Supabase Migrations

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: pr-supabase-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    name: Lint Migrations (supabase db lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase (for lint)
        run: supabase start --exclude realtime,storage-api,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor
        working-directory: supabase

      - name: Lint migration files
        run: supabase db lint
        working-directory: supabase

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: supabase

  dry-run-on-shadow:
    name: Dry-Run Migrations on Shadow DB
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shadow_user
          POSTGRES_PASSWORD: shadow_pass
          POSTGRES_DB: shadow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Apply migrations in order
        run: |
          set -euo pipefail
          export PGPASSWORD=shadow_pass
          psql -h localhost -U shadow_user -d shadow_db -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END $$;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text UNIQUE,
            email_confirmed_at timestamptz,
            created_at timestamptz,
            updated_at timestamptz,
            aud text,
            role text
          );
          CREATE OR REPLACE FUNCTION auth.uid()
          RETURNS uuid
          LANGUAGE sql
          STABLE
          AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claim.sub', true), '')::uuid,
              NULLIF((NULLIF(current_setting('request.jwt.claims', true), '')::jsonb ->> 'sub'), '')::uuid
            );
          $$;
          SQL
          MIGRATION_DIR="supabase/migrations"
          echo "Applying migrations from $MIGRATION_DIR..."
          for f in $(ls "$MIGRATION_DIR"/*.sql | sort); do
            echo "  → applying: $f"
            psql -h localhost -U shadow_user -d shadow_db -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✅ All migrations applied successfully."

      - name: Assert migration idempotency (re-run lint)
        run: |
          export PGPASSWORD=shadow_pass
          # Verify schema is consistent — tables/views can be introspected
          psql -h localhost -U shadow_user -d shadow_db -c "\dt" | grep -E "households|members|audit" || true
          echo "✅ Schema introspection passed."


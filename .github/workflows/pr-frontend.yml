name: PR — Frontend

on:
  pull_request:
    paths:
      - 'apps/frontend/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: pr-frontend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js production build
        run: npm run build
        env:
          # Build must succeed without runtime env vars (fail-closed policy).
          # Vercel injects real env vars at deploy time via git integration.
          NODE_ENV: production

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Only run if test files exist in the frontend app
    if: ${{ hashFiles('apps/frontend/src/**/*.test.*', 'apps/frontend/src/**/*.spec.*') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

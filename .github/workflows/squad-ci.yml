name: Squad CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/frontend/package-lock.json"

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Type check
        working-directory: apps/frontend
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: apps/frontend
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: trading_journal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: apps/backend
        run: uv sync

      - name: Lint with ruff
        working-directory: apps/backend
        run: uv run ruff check .

      - name: Type check with mypy
        working-directory: apps/backend
        run: uv run mypy .

      - name: Run tests with coverage
        working-directory: apps/backend
        env:
          DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/trading_journal_test"
        run: uv run pytest --cov=app --cov-report=xml --cov-report=term tests/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage.xml

  docker:
    name: Docker Build Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        working-directory: apps/frontend
        run: docker build -t trading-journal-frontend:test .

      - name: Build backend image
        working-directory: apps/backend
        run: docker build -t trading-journal-backend:test .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: npx playwright install chromium --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install backend dependencies
        working-directory: apps/backend
        run: uv sync

      - name: Start backend server
        working-directory: apps/backend
        env:
          DATABASE_URL: "sqlite:///./test.db"
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Start frontend server
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: |
          npm run start &
          sleep 10

      - name: Run Playwright tests
        working-directory: apps/frontend
        run: npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/frontend/test-results/

# RLS Reconciliation Tests — CI Workflow
#
# Trigger:  push to any squad/** branch + PRs targeting main
# Purpose:  Apply migrations from supabase/migrations/ and run pgTAP RLS tests
#
# Approach chosen: raw psql + pgTAP (not `supabase test db`)
#
# Rationale for psql approach over `supabase test db`:
#   - `supabase test db` requires the full Supabase CLI stack (supabase start +
#     a running Docker daemon). The GitHub Actions ubuntu runner supports Docker
#     natively, so we can spin up just the Postgres container directly.
#   - Using `supabase/postgres` directly (no Studio, no Auth API, no edge
#     functions) is lighter and faster for a pure SQL test suite.
#   - `supabase test db` wraps pg_prove internally; we call pg_prove (or psql)
#     directly for full control over exit codes and TAP output.
#
# ⚠️  DEPENDENCY: This workflow will FAIL until PR #85
#     (squad/61-ci-cd-scaffolding) is merged into main and its migrations
#     are available on the base branch. Until then, the workflow is informational:
#     it documents HOW the tests will run in CI once the migrations land.
#
# NOTE: This workflow is intentionally SEPARATE from pr-supabase-migrations.yml
#       (owned by Kujan / PR #85) to avoid merge conflicts and workflow coupling.

name: test-rls

on:
  push:
    branches:
      - 'squad/**'
  pull_request:
    branches:
      - main

jobs:
  rls-tests:
    name: RLS + Household Isolation Tests (pgTAP)
    runs-on: ubuntu-latest
    # Informational until Redfoot owns the dedicated E2E/RLS tier for #97.
    # Keep running to surface regressions, but do not block urgent RLS rollout.
    continue-on-error: true

    services:
      postgres:
        # supabase/postgres ships with pgTAP pre-installed and the auth schema
        # pre-created, which is required for auth.uid() / auth.users references
        # in the migrations and test helpers.
        image: supabase/postgres:15.1.1.41
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Wait for Postgres to be truly ready ────────────────────────────────
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for postgres ($i/30)..."
            sleep 2
          done

      # ── Install pg_prove (pgTAP TAP harness) ───────────────────────────────
      # pg_prove ships in the libtap-parser-sourcehandler-pgtap-perl package
      # on Ubuntu. Fall back to a plain psql-based runner if not available.
      - name: Install pgTAP test runner
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            postgresql-client \
            libtap-parser-sourcehandler-pgtap-perl
          pg_prove --version || echo "pg_prove not found; will use psql fallback"

      # ── Enable pgTAP extension in the database ─────────────────────────────
      - name: Enable pgTAP extension
        run: |
          psql -c "CREATE EXTENSION IF NOT EXISTS pgtap;"

      # ── Apply Supabase migrations in order ─────────────────────────────────
      # Migrations are sorted lexicographically (timestamp-prefix ensures order).
      # Migrations marked ⚠️ SKETCH or DESTRUCTIVE are present in the directory
      # but contain only comments / commented-out SQL — they are safe to source.
      - name: Apply migrations
        run: |
          echo "Applying migrations from supabase/migrations/ ..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "  → $f"
            psql -f "$f" || { echo "FAILED: $f"; exit 1; }
          done
          echo "All migrations applied."

      # ── Load test helpers ──────────────────────────────────────────────────
      - name: Load test helpers (00_setup.sql)
        run: |
          psql -f supabase/tests/00_setup.sql

      # ── Run pgTAP tests ────────────────────────────────────────────────────
      # We use pg_prove when available (exits non-zero on test failure).
      # The `--failures` flag prints only failed tests, keeping CI logs clean.
      - name: Run RLS tests with pg_prove
        id: run_tests
        continue-on-error: true
        run: |
          if command -v pg_prove &> /dev/null; then
            pg_prove \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname postgres \
              --failures \
              supabase/tests/10_household_membership.sql \
              supabase/tests/20_household_data_isolation.sql \
              supabase/tests/30_owner_private_isolation.sql \
              supabase/tests/40_audit_columns.sql
          else
            # Fallback: run each file with psql, check for FAILED lines
            FAILED=0
            for f in \
              supabase/tests/10_household_membership.sql \
              supabase/tests/20_household_data_isolation.sql \
              supabase/tests/30_owner_private_isolation.sql \
              supabase/tests/40_audit_columns.sql
            do
              echo "Running $f ..."
              OUTPUT=$(psql --tuples-only -f "$f" 2>&1)
              echo "$OUTPUT"
              if echo "$OUTPUT" | grep -qiE '^(not ok|FAILED)'; then
                echo "::error::Test failures in $f"
                FAILED=1
              fi
            done
            exit $FAILED
          fi

      # ── Upload TAP results as artifact (optional) ─────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-test-results
          path: |
            supabase/tests/*.sql
          retention-days: 7

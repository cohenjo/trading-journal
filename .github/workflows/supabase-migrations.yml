name: Supabase — Apply Migrations to Production

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
# 1. push to main  — when migration files change, show a pending-migrations diff
#    and auto-apply if the commit message contains the [apply-migrations] marker.
# 2. workflow_dispatch — applies when dry_run=false; dry_run=true shows the diff only.
#
# Required GitHub Secrets (Settings → Secrets and Variables → Actions):
#   Preferred path:
#     SUPABASE_ACCESS_TOKEN — Personal access token from supabase.com/dashboard/account/tokens
#     SUPABASE_DB_PASSWORD  — Database password for the linked production project
#   Fallback path:
#     SUPABASE_PROD_DB_URL  — Direct Postgres URL with embedded credentials; used only
#                             when the preferred CLI secrets are unavailable.
#
# Decisions context (decisions.md):
#   - Prefer linked Supabase CLI migrations when access-token/password secrets exist.
#   - Production has known migration-history drift that blocks safe `db push` in the
#     fallback path; use targeted, idempotent psql applies for the expense pipeline.
#   - Never log database connection strings; rely on GitHub secret masking and add-mask.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only — show pending migrations without applying'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false   # never cancel a migration mid-flight

jobs:
  migrate:
    name: Apply Migrations — Production
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 0. Guard: fail fast if no supported migration auth path exists ──────
      - name: Guard — migration secrets must be present
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${SUPABASE_PROD_DB_URL:-}" ]; then
            masked_url="${SUPABASE_PROD_DB_URL//%/%25}"
            masked_url="${masked_url//$'\r'/%0D}"
            masked_url="${masked_url//$'\n'/%0A}"
            echo "::add-mask::$masked_url"
          fi

          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "auth_path=linked" >> "$GITHUB_OUTPUT"
            echo "✅ Preferred Supabase CLI migration secrets present."
          elif [ -n "${SUPABASE_PROD_DB_URL:-}" ]; then
            echo "auth_path=db-url" >> "$GITHUB_OUTPUT"
            echo "✅ Using SUPABASE_PROD_DB_URL fallback for production migrations."
            if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
              echo "::warning::Only one preferred Supabase CLI secret is set; falling back to SUPABASE_PROD_DB_URL."
            fi
          else
            echo "::error::Set either SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD or SUPABASE_PROD_DB_URL under Settings → Secrets → Actions."
            exit 1
          fi

      # ── 1. Determine apply mode ───────────────────────────────────────────────
      #
      # Auto-apply rules:
      #   - workflow_dispatch with dry_run=false  → apply
      #   - workflow_dispatch with dry_run=true   → diff only
      #   - push to main with [apply-migrations]  → apply
      #   - push to main without marker           → diff only (safe default)
      #
      # This prevents a rebase/squash that touches migration files from silently
      # pushing schema changes. An explicit opt-in is required for push events.
      - name: Determine apply mode
        id: mode
        # Security: user-controlled fields (commit message) and workflow inputs are
        # passed via step-scoped env vars, never inlined into the run: body.
        # Ref: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_INPUT_DRY_RUN: ${{ inputs.dry_run }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GH_INPUT_DRY_RUN" = "true" ]; then
              echo "apply=false" >> "$GITHUB_OUTPUT"
              echo "reason=workflow_dispatch dry-run requested" >> "$GITHUB_OUTPUT"
            else
              echo "apply=true"  >> "$GITHUB_OUTPUT"
              echo "reason=workflow_dispatch (manual apply)" >> "$GITHUB_OUTPUT"
            fi
          else
            # push event — check commit message for opt-in marker
            if echo "$COMMIT_MSG" | grep -qF '[apply-migrations]'; then
              echo "apply=true"  >> "$GITHUB_OUTPUT"
              echo "reason=commit message contains [apply-migrations] marker" >> "$GITHUB_OUTPUT"
            else
              echo "apply=false" >> "$GITHUB_OUTPUT"
              echo "reason=push event without [apply-migrations] marker (diff only)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Setup PostgreSQL client (DB URL fallback)
        if: steps.secrets.outputs.auth_path == 'db-url'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --no-install-recommends -y postgresql-client
          fi
          psql --version

      # ── 2. Show pending migrations (always) ───────────────────────────────────
      - name: Show pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail

          echo "## Apply mode: ${{ steps.mode.outputs.reason }}"
          echo ""
          echo "### Pending migrations on production:"
          if [ "${{ steps.secrets.outputs.auth_path }}" = "db-url" ]; then
            applied_versions="$(psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -Atc "select version from supabase_migrations.schema_migrations order by version")"

            echo "Local migration files not present in production migration history:"
            found_pending=false
            while IFS= read -r file; do
              base="$(basename "$file")"
              version="${base%%_*}"
              if ! grep -qx "$version" <<< "$applied_versions"; then
                echo "  - $base"
                found_pending=true
              fi
            done < <(find migrations -maxdepth 1 -type f -name '[0-9]*_*.sql' | sort)
            if [ "$found_pending" = "false" ]; then
              echo "  (none)"
            fi

            echo ""
            echo "Production history entries not present locally (known drift; not repaired by this workflow):"
            local_versions="$(find migrations -maxdepth 1 -type f -name '[0-9]*_*.sql' -exec basename {} \; | sed -E 's/^([0-9]+)_.*/\1/' | sort)"
            found_remote_only=false
            while IFS= read -r version; do
              if [ -n "$version" ] && ! grep -qx "$version" <<< "$local_versions"; then
                echo "  - $version"
                found_remote_only=true
              fi
            done <<< "$applied_versions"
            if [ "$found_remote_only" = "false" ]; then
              echo "  (none)"
            fi
          else
            supabase migration list --linked
          fi
        working-directory: supabase

      # ── 3. Apply (conditional) ────────────────────────────────────────────────
      - name: Apply migrations
        if: steps.mode.outputs.apply == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail

          required_tables=(
            expense_inbox
            expense_categories
            credit_card_statements
            credit_card_transactions
            merchant_category_mappings
          )
          expense_migrations=(
            20260529122500_add_credit_card_expense_pipeline.sql
            20260529122501_seed_expense_categories.sql
          )

          table_list_sql() {
            local joined=""
            local table
            for table in "${required_tables[@]}"; do
              if [ -n "$joined" ]; then
                joined+=","
              fi
              joined+="'$table'"
            done
            printf '%s' "$joined"
          }

          record_migration() {
            local file="$1"
            local base version name
            base="$(basename "$file")"
            version="${base%%_*}"
            name="${base#*_}"
            name="${name%.sql}"

            if ! [[ "$version" =~ ^[0-9]{14}$ ]] || ! [[ "$name" =~ ^[A-Za-z0-9_]+$ ]]; then
              echo "::error::Unexpected migration filename '$base'."
              exit 1
            fi

            psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -c \
              "insert into supabase_migrations.schema_migrations(version, name, statements) values ('$version', '$name', array['-- applied by production DB URL fallback workflow']) on conflict (version) do nothing;" \
              >/dev/null
          }

          verify_expense_tables() {
            local existing_tables missing_count categories_count table
            existing_tables="$(psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -Atc "select table_name from information_schema.tables where table_schema = 'public' and table_name in ($(table_list_sql)) order by table_name")"
            missing_count=0
            for table in "${required_tables[@]}"; do
              if ! grep -qx "$table" <<< "$existing_tables"; then
                echo "::error::Required production table '$table' is missing."
                missing_count=$((missing_count + 1))
              fi
            done
            if [ "$missing_count" -ne 0 ]; then
              return 1
            fi

            categories_count="$(psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -Atc "select count(*) from public.expense_categories")"
            echo "✅ Verified credit-card expense tables exist; expense_categories rows: $categories_count"
          }

          apply_expense_pipeline_directly() {
            local applied_versions existing_tables apply_needed migration table

            applied_versions="$(psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -Atc "select version from supabase_migrations.schema_migrations order by version")"
            existing_tables="$(psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -Atc "select table_name from information_schema.tables where table_schema = 'public' and table_name in ($(table_list_sql)) order by table_name")"
            apply_needed=false

            for table in "${required_tables[@]}"; do
              if ! grep -qx "$table" <<< "$existing_tables"; then
                echo "::warning::Production table '$table' is missing; rerunning idempotent expense pipeline migrations."
                apply_needed=true
              fi
            done

            for migration in "${expense_migrations[@]}"; do
              if ! grep -qx "${migration%%_*}" <<< "$applied_versions"; then
                echo "::warning::Migration history is missing '${migration%%_*}'; applying $migration."
                apply_needed=true
              fi
            done

            if [ "$apply_needed" = "false" ]; then
              echo "No direct psql apply needed; expense pipeline migrations are already tracked and tables exist."
              verify_expense_tables
              return
            fi

            for migration in "${expense_migrations[@]}"; do
              echo "Applying $migration via direct psql fallback..."
              psql "$SUPABASE_PROD_DB_URL" -v ON_ERROR_STOP=1 -f "migrations/$migration"
              record_migration "migrations/$migration"
            done

            verify_expense_tables
          }

          echo "🚀 Applying pending migrations to production..."
          if [ "${{ steps.secrets.outputs.auth_path }}" = "db-url" ]; then
            echo "Using direct DB URL fallback. Known production migration drift blocks safe db push; applying/verifying the idempotent expense pipeline migrations only."
            apply_expense_pipeline_directly
          else
            supabase db push --linked --yes
          fi
          echo "✅ Migrations applied successfully."
        working-directory: supabase

      - name: Skip notice (diff-only run)
        if: steps.mode.outputs.apply == 'false'
        shell: bash
        run: |
          echo "ℹ️  Diff-only run — no migrations applied."
          echo ""
          echo "To apply on the next merge to main, include [apply-migrations] in the commit message."
          echo "To apply immediately, trigger this workflow manually with dry_run=false."

name: PR — Backend

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: pr-backend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    # mypy is listed as a dev dependency in pyproject.toml
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check for mypy config
        id: mypy_config
        run: |
          if grep -q '\[tool\.mypy\]' pyproject.toml 2>/dev/null || [ -f mypy.ini ] || [ -f .mypy.ini ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No mypy configuration found — skipping typecheck. Add [tool.mypy] to pyproject.toml to enable."
          fi

      - name: Run mypy
        if: steps.mypy_config.outputs.has_config == 'true'
        run: uv run mypy app

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # Guard: only run if test files exist
    if: ${{ hashFiles('apps/backend/**/test_*.py', 'apps/backend/**/*_test.py') != '' }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest --tb=short -q
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: 'true'
